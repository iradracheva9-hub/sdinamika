<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Квиз: Твоя Целевая Аудитория</title>
    <style>
        :root { --bg-color: #f4f4f9; --btn-color: #6200ea; --text-color: #333; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; transition: background 0.5s; }
        #quiz-container { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 650px; width: 90%; text-align: center; }
        
        /* Прогресс-бар */
        .progress-wrapper { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--btn-color); width: 0%; transition: width 0.4s ease; }
        
        h2 { margin-bottom: 1.5rem; font-size: 1.5rem; line-height: 1.3; }
        .option-btn { display: block; width: 100%; padding: 14px; margin: 12px 0; border: 2px solid var(--btn-color); background: transparent; color: var(--btn-color); border-radius: 10px; cursor: pointer; font-size: 1.1rem; font-weight: 500; transition: 0.3s; }
        .option-btn:hover { background: var(--btn-color); color: white; transform: translateY(-2px); }
        .hidden { display: none; }
        
        /* Стили для карточек результата */
        #result-desc { text-align: left; line-height: 1.7; margin: 20px 0; }
        .level-card { padding: 20px; border-left: 5px solid var(--btn-color); background: #fdfdfd; margin-bottom: 20px; border-radius: 0 12px 12px 0; box-shadow: 2px 2px 15px rgba(0,0,0,0.03); }
        .level-title { font-weight: bold; font-size: 1.25rem; color: var(--btn-color); display: block; margin-bottom: 8px; }
        
        #cta-btn { background: var(--btn-color); color: white; padding: 18px 36px; text-decoration: none; border-radius: 12px; display: inline-block; font-weight: bold; margin-top: 15px; transition: opacity 0.3s; }
        #cta-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="quiz-step">
        <div class="progress-wrapper"><div id="progress-fill"></div></div>
        <div style="font-size: 0.85rem; color: #888; margin-bottom: 15px;" id="progress-text"></div>
        <h2 id="question-text">Загрузка квиза...</h2>
        <div id="options-container"></div>
    </div>
    
    <div id="result-step" class="hidden">
        <h2 style="margin-bottom: 10px;">Твой результат</h2>
        <p style="color: #666; margin-bottom: 25px;">На основе твоих ответов мы определили оптимальную аудиторию для твоего инфобизнеса:</p>
        <div id="result-desc"></div>
        <a id="cta-btn" href="#">Получить подарок</a>
    </div>
</div>

<script>
    const STORAGE_KEY = 'spiral_quiz_data';
    
    // Загрузка конфига с проверкой на null
    let config = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { 
        questions: [], 
        styles: { bg: '#f4f4f9', btn: '#6200ea', text: '#333' }, 
        ctaText: 'Далее', 
        ctaLink: '#' 
    };

    let currentStep = 0;
    let scores = { A: 0, B: 0, V: 0, G: 0, D: 0 };

    function applyStyles() {
        document.documentElement.style.setProperty('--bg-color', config.styles.bg);
        document.documentElement.style.setProperty('--btn-color', config.styles.btn);
        document.documentElement.style.setProperty('--text-color', config.styles.text);
    }

    function renderQuestion() {
        if (!config.questions || config.questions.length === 0) {
            document.getElementById('question-text').innerText = "Квиз еще не настроен. Зайдите в admin.html и добавьте вопросы.";
            return;
        }

        if (currentStep >= config.questions.length) return showResult();

        const qData = config.questions[currentStep];
        
        // Обновление прогресс-бара
        const progressPercent = (currentStep / config.questions.length) * 100;
        document.getElementById('progress-fill').style.width = progressPercent + "%";
        document.getElementById('progress-text').innerText = `Вопрос ${currentStep + 1} из ${config.questions.length}`;
        
        document.getElementById('question-text').innerText = qData.title;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        const types = ['A', 'B', 'V', 'G', 'D'];
        types.forEach(type => {
            // Проверка, чтобы не выводить пустые кнопки
            if (qData[type] && qData[type].trim() !== "") {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = qData[type];
                btn.onclick = () => { scores[type]++; currentStep++; renderQuestion(); };
                container.appendChild(btn);
            }
        });
    }

    function showResult() {
        document.getElementById('progress-fill').style.width = "100%";
        document.getElementById('quiz-step').classList.add('hidden');
        document.getElementById('result-step').classList.remove('hidden');
        
        const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
        const pK = sorted[0][0], sK = sorted[1][0];

        // Развернутые описания из файла "Уровни и смыслы"
        const data = {
            A: { 
                name: "Бежевая аудитория", 
                desc: "Их основная боль — базовые потребности, которые часто не закрыты[cite: 11]. Это целевая аудитория, которая очень сильно экономит и выбирает продукты не из качества, а из цены[cite: 15, 17]. Идеально подходят обучения про выплаты от государства, списание долгов и способы сэкономить[cite: 20, 21]." 
            },
            B: { 
                name: "Фиолетовая аудитория", 
                desc: "Для них самое главное — это семья, дети и сохранение отношений[cite: 24, 25]. Каждое обучение и покупку они обычно согласовывают с мужем или родственниками[cite: 32, 33]. Им подходят продукты по укреплению брака, здоровью детей и женственности[cite: 26, 27, 29]." 
            },
            V: { 
                name: "Красная аудитория", 
                desc: "Их боль — желание получить всё и сразу, стать миллионером прямо сейчас[cite: 37, 38]. Покупают всё, что позволяет сделать очень быстрый результат, реагируя на агрессивные манипуляции в продажах[cite: 41, 42]. Часто используют рассрочки для покупки обучения с высоким чеком[cite: 40, 45]." 
            },
            G: { 
                name: "Синяя аудитория", 
                desc: "Сотрудники найма или корпораций, ценящие стабильность[cite: 48, 49]. Им скучно на работе, поэтому они ищут качественный досуг (вокал, танцы) или спокойный выход на фриланс[cite: 50, 51, 54]. Платят обычно наличными[cite: 52]." 
            },
            D: { 
                name: "Оранжевая аудитория", 
                desc: "Предприниматели, стремящиеся к планомерному масштабированию и управлению состоянием[cite: 56, 57]. Покупают точечные навыки (трафик, команда) и глубокую работу с головой[cite: 59, 61, 64]. Решения принимают взвешенно[cite: 65]." 
            }
        };

        document.getElementById('result-desc').innerHTML = `
            <div class="level-card">
                <span class="level-title">Основной тип: ${data[pK].name}</span>
                <p style="margin: 10px 0 0 0; line-height: 1.6;">${data[pK].desc}</p>
            </div>
            <div class="level-card" style="opacity: 0.8; border-left-color: #ccc;">
                <span class="level-title" style="color: #666;">Дополнительный вектор: ${data[sK].name}</span>
                <p style="margin: 10px 0 0 0; line-height: 1.6;">${data[sK].desc}</p>
            </div>
        `;
        
        const cta = document.getElementById('cta-btn');
        cta.innerText = config.ctaText;
        cta.href = config.ctaLink;
    }

    applyStyles();
    renderQuestion();
</script>
</body>
</html>
