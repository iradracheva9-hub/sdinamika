<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Квиз по Спиральной Динамике</title>
    <style>
        :root { --bg-color: #f4f4f9; --btn-color: #6200ea; --text-color: #333; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; transition: background 0.5s; }
        #quiz-container { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 650px; width: 90%; text-align: center; }
        
        /* Прогресс-бар */
        .progress-wrapper { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--btn-color); width: 0%; transition: width 0.4s ease; }
        
        h2 { margin-bottom: 1.5rem; font-size: 1.5rem; }
        .option-btn { display: block; width: 100%; padding: 14px; margin: 12px 0; border: 2px solid var(--btn-color); background: transparent; color: var(--btn-color); border-radius: 10px; cursor: pointer; font-size: 1.1rem; font-weight: 500; transition: 0.3s; }
        .option-btn:hover { background: var(--btn-color); color: white; transform: translateY(-2px); }
        .hidden { display: none; }
        #result-desc { text-align: left; line-height: 1.7; margin: 20px 0; padding: 15px; border-left: 4px solid var(--btn-color); background: #f9f9f9; }
        #cta-btn { background: var(--btn-color); color: white; padding: 16px 32px; text-decoration: none; border-radius: 10px; display: inline-block; font-weight: bold; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="quiz-step">
        <div class="progress-wrapper"><div id="progress-fill"></div></div>
        <div style="font-size: 0.8rem; color: #888; margin-bottom: 10px;" id="progress-text"></div>
        <h2 id="question-text">Загрузка...</h2>
        <div id="options-container"></div>
    </div>
    
    <div id="result-step" class="hidden">
        <h2>Твой результат</h2>
        <div id="result-desc"></div>
        <a id="cta-btn" href="#">Кнопка действия</a>
    </div>
</div>

<script>
    const STORAGE_KEY = 'spiral_quiz_data';
    // Правка 1: Обработка пустого конфига при первом запуске
    let config = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { questions: [], styles: { bg: '#f4f4f9', btn: '#6200ea', text: '#333' }, ctaText: 'Далее', ctaLink: '#' };

    let currentStep = 0;
    let scores = { A: 0, B: 0, V: 0, G: 0, D: 0 };

    function applyStyles() {
        document.documentElement.style.setProperty('--bg-color', config.styles.bg);
        document.documentElement.style.setProperty('--btn-color', config.styles.btn);
        document.documentElement.style.setProperty('--text-color', config.styles.text);
    }

    function renderQuestion() {
        if (!config.questions || config.questions.length === 0) {
            document.getElementById('question-text').innerText = "Квиз еще не настроен в админ-панели.";
            return;
        }

        if (currentStep >= config.questions.length) return showResult();

        const qData = config.questions[currentStep];
        
        // Обновление прогресс-бара
        const progressPercent = (currentStep / config.questions.length) * 100;
        document.getElementById('progress-fill').style.width = progressPercent + "%";
        document.getElementById('progress-text').innerText = `Вопрос ${currentStep + 1} из ${config.questions.length}`;
        
        document.getElementById('question-text').innerText = qData.title;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        const types = ['A', 'B', 'V', 'G', 'D'];
        types.forEach(type => {
            // Правка 2: Проверка на пустые варианты ответов
            if (qData[type] && qData[type].trim() !== "") {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = qData[type];
                btn.onclick = () => { scores[type]++; currentStep++; renderQuestion(); };
                container.appendChild(btn);
            }
        });
    }

    function showResult() {
        document.getElementById('progress-fill').style.width = "100%";
        document.getElementById('quiz-step').classList.add('hidden');
        document.getElementById('result-step').classList.remove('hidden');
        
        const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
        const pK = sorted[0][0], sK = sorted[1][0];

        // Смыслы из файла "Уровни и смыслы" [cite: 11, 24, 38, 48, 56]
        const data = {
            A: { name: "Бежевая", desc: "Фокус на выживании и экономии. Покупают из-за скидок и нужды[cite: 11, 17]." },
            B: { name: "Фиолетовая", desc: "Главное — семья и дети. Покупают то, что укрепит отношения[cite: 24, 34]." },
            V: { name: "Красная", desc: "Хотят быстрых денег, статуса и «успешного успеха»[cite: 38, 45]." },
            G: { name: "Синяя", desc: "Ценят стабильность, порядок и предсказуемость[cite: 48, 54]." },
            D: { name: "Оранжевая", desc: "Фокус на масштабировании бизнеса и управлении результатом[cite: 56, 66]." }
        };

        document.getElementById('result-desc').innerHTML = `
            <p><b>Основная:</b> ${data[pK].name}. ${data[pK].desc}</p>
            <p><b>Дополнительная:</b> ${data[sK].name}. ${data[sK].desc}</p>
        `;
        const cta = document.getElementById('cta-btn');
        cta.innerText = config.ctaText;
        cta.href = config.ctaLink;
    }

    applyStyles();
    renderQuestion();
</script>
</body>
</html>
