<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Квиз: Твоя Целевая Аудитория</title>
    <style>
        :root { --bg-color: #f4f4f9; --btn-color: #6200ea; --text-color: #333; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; transition: background 0.5s; }
        #quiz-container { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 600px; width: 90%; text-align: center; }
        .progress-wrapper { width: 100%; height: 8px; background: #eee; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        #progress-fill { height: 100%; background: var(--btn-color); width: 0%; transition: width 0.4s ease; }
        h2 { margin-bottom: 1.5rem; font-size: 1.4rem; line-height: 1.3; }
        .option-btn { display: block; width: 100%; padding: 14px; margin: 10px 0; border: 2px solid var(--btn-color); background: transparent; color: var(--btn-color); border-radius: 10px; cursor: pointer; font-size: 1rem; font-weight: 500; transition: 0.3s; }
        .option-btn:hover { background: var(--btn-color); color: white; transform: translateY(-2px); }
        .hidden { display: none; }
        .level-card { text-align: left; padding: 20px; border-left: 5px solid var(--btn-color); background: #f9f9fb; margin-bottom: 20px; border-radius: 0 12px 12px 0; }
        .level-title { font-weight: bold; font-size: 1.2rem; color: var(--btn-color); display: block; margin-bottom: 10px; }
        ul { padding-left: 20px; margin: 0; }
        li { margin-bottom: 8px; font-size: 0.95rem; line-height: 1.5; }
        #cta-btn { background: var(--btn-color); color: white; padding: 16px 32px; text-decoration: none; border-radius: 10px; display: inline-block; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="quiz-step">
        <div class="progress-wrapper"><div id="progress-fill"></div></div>
        <div style="font-size: 0.8rem; color: #888; margin-bottom: 10px;" id="progress-text"></div>
        <h2 id="question-text">Загрузка квиза...</h2>
        <div id="options-container"></div>
    </div>

    <div id="result-step" class="hidden">
        <h2>Анализ завершен</h2>
        <div id="result-desc"></div>
        <a id="cta-btn" href="#">Перейти далее</a>
    </div>
</div>

<script>
    const STORAGE_KEY = 'spiral_quiz_data';
    const config = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { questions: [], styles: { bg: '#f4f4f9', btn: '#6200ea', text: '#333' }, ctaText: 'Кнопка', ctaLink: '#' };

    let currentStep = 0;
    let scores = { A: 0, B: 0, V: 0, G: 0, D: 0 };

    function applyStyles() {
        document.documentElement.style.setProperty('--bg-color', config.styles.bg);
        document.documentElement.style.setProperty('--btn-color', config.styles.btn);
        document.documentElement.style.setProperty('--text-color', config.styles.text);
    }

    function renderQuestion() {
        if (!config.questions || config.questions.length === 0) {
            document.getElementById('question-text').innerText = "Настройте вопросы в админ-панели (admin.html)";
            return;
        }
        if (currentStep >= config.questions.length) return showResult();

        const qData = config.questions[currentStep];
        document.getElementById('progress-fill').style.width = (currentStep / config.questions.length * 100) + "%";
        document.getElementById('progress-text').innerText = `Вопрос ${currentStep + 1} из ${config.questions.length}`;
        document.getElementById('question-text').innerText = qData.title;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        ['A', 'B', 'V', 'G', 'D'].forEach(type => {
            if (qData[type] && qData[type].trim() !== "") {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = qData[type];
                btn.onclick = () => { scores[type]++; currentStep++; renderQuestion(); };
                container.appendChild(btn);
            }
        });
    }

    function showResult() {
        document.getElementById('quiz-step').classList.add('hidden');
        document.getElementById('result-step').classList.remove('hidden');
        
        const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
        const pK = sorted[0][0], sK = sorted[1][0];

        const data = {
            A: { name: "Бежевая (Выживание)", desc: "<ul><li><b>Боли</b>: Нехватка ресурсов, долги [cite: 11, 14].</li><li><b>Поведение</b>: Выбирают по цене, ищут скидки [cite: 15, 17].</li><li><b>Продукт</b>: Помощь в выживании, субсидии[cite: 20].</li></ul>" },
            B: { name: "Фиолетовая (Семья)", desc: "<ul><li><b>Боли</b>: Безопасность близких и детей [cite: 24, 25].</li><li><b>Поведение</b>: Советуются с семьей и мужем [cite: 32, 33].</li><li><b>Продукт</b>: Здоровье, отношения, женственность[cite: 26, 27].</li></ul>" },
            V: { name: "Красная (Достигаторство)", desc: "<ul><li><b>Боли</b>: Жажда статуса и быстрых денег [cite: 37, 38].</li><li><b>Поведение</b>: Покупают на импульсе, любят хайп [cite: 41, 45].</li><li><b>Продукт</b>: Наставничество, быстрый успех[cite: 39, 42].</li></ul>" },
            G: { name: "Синяя (Стабильность)", desc: "<ul><li><b>Боли</b>: Скука в найме, поиск смыслов [cite: 48, 54].</li><li><b>Поведение</b>: Ценят порядок, платят наличными [cite: 49, 52].</li><li><b>Продукт</b>: Качественный досуг, новые профессии[cite: 50, 51].</li></ul>" },
            D: { name: "Оранжевая (Система)", desc: "<ul><li><b>Боли</b>: Масштабирование и выгорание [cite: 56, 57].</li><li><b>Поведение</b>: Взвешенный подход, ценят навыки [cite: 60, 65].</li><li><b>Продукт</b>: Команда, трафик, управление эмоциями[cite: 61, 64].</li></ul>" }
        };

        document.getElementById('result-desc').innerHTML = `
            <div class="level-card"><span class="level-title">Основной тип: ${data[pK].name}</span>${data[pK].desc}</div>
            <div class="level-card" style="opacity:0.7"><span class="level-title" style="color:#666">Дополнительно: ${data[sK].name}</span>${data[sK].desc}</div>
        `;
        const cta = document.getElementById('cta-btn');
        cta.innerText = config.ctaText; cta.href = config.ctaLink;
    }

    applyStyles();
    renderQuestion();
</script>
</body>
</html>
